<script src="../js/app.js?v=20260615"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const backTop = document.getElementById('back-to-top');
  if (backTop) {
    window.addEventListener('scroll', () => { backTop.classList.toggle('visible', window.scrollY > 400); });
    backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }

  const now = new Date().getMonth() + 1; // 1-12

  const MONTH_BANNER_IMGS = {
    1:'../images/character/base/noa-snow-kimono-long.png',
    2:'../images/character/base/noa-snow-kimono-long.png',
    3:'../images/character/base/noa-white-formal-lotus.png',
    4:'../images/character/base/noa-hakama-smile.png',
    5:'../images/character/base/noa-white-kimono-excited.png',
    6:'../images/character/base/noa-china-dress-wink.png',
    7:'../images/character/base/noa-white-navy-lotus.png',
    8:'../images/character/base/noa-china-dress-wink.png',
    9:'../images/character/base/noa-purple-kimono-wave.png',
    10:'../images/character/base/noa-black-kimono-camellia.png',
    11:'../images/character/base/noa-black-kimono-pensive.png',
    12:'../images/character/base/noa-snow-kimono-updo.png',
  };

  // 今月のピックアップバナー
  if (window.MONTHLY_DATA && MONTHLY_DATA[now]) {
    const cur = MONTHLY_DATA[now];
    const bannerEl = document.getElementById('current-month-banner');
    if (bannerEl) {
      bannerEl.style.display = '';
      const bannerImg = MONTH_BANNER_IMGS[now];
      bannerEl.innerHTML = `
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          ${bannerImg ? `<img src="${bannerImg}" alt="旅ノア" style="width:56px;height:auto;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))">` : ''}
          <div style="flex:1">
            <div style="font-size:0.78rem;font-weight:700;color:var(--gold);margin-bottom:2px">🗓 今月のおすすめ</div>
            <div style="font-size:1.05rem;font-weight:800;color:var(--navy)">${now}月 — ${cur.theme||''}</div>
            ${cur.picks && cur.picks.length ? `<div style="font-size:0.82rem;color:var(--text-light);margin-top:4px">注目スポット：${cur.picks.slice(0,3).map(p=>p.name).join('・')}</div>` : ''}
          </div>
          <a href="../templates/monthly-detail.html?month=${now}" class="btn btn-sm" style="white-space:nowrap">詳しく見る →</a>
        </div>`;
    }
  }

  const MONTH_IMGS = [null,
    '../images/japan/hokkaido/hokkaido-noboribetsu-01.jpg',
    '../images/japan/yamagata/yamagata-zao-02.jpg',
    '../images/japan/ibaraki/ibaraki-kairakuen-02.jpg',
    '../images/japan/aomori/aomori-hirosaki-02.jpg',
    '../images/japan/nagano/nagano-kamikochi-01.jpg',
    '../images/japan/ibaraki/ibaraki-nemophila-02.jpg',
    '../images/japan/hokkaido/hokkaido-biei-flower-field-01.jpg',
    '../images/japan/okinawa/okinawa-sea-coast-02.jpg',
    '../images/japan/miyagi/miyagi-matsushima-01.jpg',
    '../images/japan/kyoto/kyoto-arashiyama-01.jpg',
    '../images/japan/kyoto/kyoto-kinkakuji-01.jpg',
    '../images/japan/tokyo/tokyo-shibuya-night-04.jpg',
  ];
  const MONTH_CLOTHING = [null,
    '厚手コート・手袋・マフラー必須',
    '防寒完全装備。スキーウェア推奨',
    '厚めのアウター。花粉対策も',
    '軽いアウター・カーディガン',
    '薄手ジャケット1枚・日焼け止め',
    '折りたたみ傘必須・蒸し暑対策',
    '半袖・帽子・日焼け止め・虫除け',
    '半袖・熱中症対策・冷却グッズ',
    '薄手ジャケット・重ね着推奨',
    '軽いアウター・紅葉スポットは山間部は寒い',
    '厚いアウター・山間部は要防寒',
    'コート・手袋・マフラーそろそろ出番',
  ];

  // 月別おすすめ温泉地
  const MONTH_ONSEN = [null,
    '草津・蔵王・乳頭温泉',    // 1月
    '銀山温泉・蔵王・野沢温泉', // 2月
    '箱根・熱海・城崎温泉',    // 3月
    '草津・有馬・湯布院',      // 4月
    '奥入瀬・上山温泉',       // 5月
    '別府・白浜・城崎温泉',    // 6月
    '黒川温泉・指宿・湯布院',  // 7月
    '登別・洞爺・北海道温泉',  // 8月
    '草津・箱根・奥飛騨',      // 9月
    '有馬・草津・城崎温泉',    // 10月
    '箱根・湯布院・黒川温泉',  // 11月
    '草津・登別・銀山温泉',    // 12月
  ];

  const grid = document.getElementById('monthly-grid');
  if (!grid) return;
  const mn = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  grid.innerHTML = Array.from({length:12},(_,i) => {
    const m = i + 1;
    const data = window.MONTHLY_DATA && MONTHLY_DATA[m];
    const isCurrent = m === now;
    const img = MONTH_IMGS[m];
    const topPicks = (data?.picks || []).slice(0,3).map(p => (p.name||p).replace(/（.*?）/,'')).join('・');
    const clothing = MONTH_CLOTHING[m] || '';
    const onsen = MONTH_ONSEN[m] || '';
    return `<div class="month-card${data?' has-data':''}${isCurrent?' current-month':''}"
      style="cursor:pointer;padding:0;overflow:hidden;border-radius:var(--radius-lg);display:flex;flex-direction:column"
      onclick="location.href='../templates/monthly-detail.html?month=${m}'">
      <div style="position:relative;height:100px;overflow:hidden;flex-shrink:0">
        ${img ? `<img src="${img}" alt="${mn[m]}" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy">
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(12,27,53,0.25),rgba(12,27,53,0.72))"></div>` : `<div style="height:100%;background:linear-gradient(135deg,#0c1b35,#1a3060)"></div>`}
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div class="month-num" style="color:white;text-shadow:0 2px 6px rgba(0,0,0,0.5)">${m}</div>
          <div class="month-name-ja" style="color:rgba(255,255,255,0.9)">${mn[m]}</div>
        </div>
        ${isCurrent ? '<div class="current-badge">今月</div>' : ''}
      </div>
      <div style="padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:4px">
        ${data ? `
          <div style="font-size:0.72rem;color:var(--navy);font-weight:700;line-height:1.4">${data.theme||''}</div>
          ${topPicks ? `<div style="font-size:0.69rem;color:var(--text-light)">📍 ${topPicks}</div>` : ''}
          ${onsen ? `<div style="font-size:0.67rem;color:var(--teal)">♨️ ${onsen}</div>` : ''}
          ${clothing ? `<div style="font-size:0.66rem;color:#7c9;background:rgba(100,200,100,0.08);border-radius:4px;padding:2px 6px;display:inline-block">👗 ${clothing}</div>` : ''}
          <div style="margin-top:auto;padding-top:4px;font-size:0.72rem;color:var(--teal);font-weight:700">詳しく見る →</div>
        ` : `
          <div style="font-size:0.7rem;color:var(--navy);font-weight:700">この月の旅行情報</div>
          ${onsen ? `<div style="font-size:0.67rem;color:var(--teal)">♨️ ${onsen}</div>` : ''}
          ${clothing ? `<div style="font-size:0.66rem;color:var(--text-light)">👗 ${clothing}</div>` : ''}
          <div style="margin-top:auto;padding-top:4px;font-size:0.72rem;color:var(--teal);font-weight:700">詳しく見る →</div>
        `}
      </div>
    </div>`;
  }).join('');
});
</script>
</body>
</html>
