const grid = document.getElementById('grid');

function renderAll(filter) {
  const filtered = filter ? IMAGES.filter(i => i.status === filter) : IMAGES;
  const counts = {ok:0, fixed:0, warn:0, placeholder:0, ng:0};
  IMAGES.forEach(i => { if(counts[i.status]!==undefined) counts[i.status]++; });
  document.getElementById('cnt-ok').textContent = counts.ok;
  document.getElementById('cnt-fixed').textContent = counts.fixed;
  document.getElementById('cnt-warn').textContent = counts.warn;
  document.getElementById('cnt-placeholder').textContent = counts.placeholder;
  document.getElementById('cnt-ng').textContent = counts.ng;

  let currentSection = '';
  let html = '';
  filtered.forEach(img => {
    if (img.section !== currentSection) {
      currentSection = img.section;
    }
    let thumbHtml;
    if (img.status === 'ng') {
      thumbHtml = `<div class="thumb-ng">❌</div>`;
    } else if (!img.file) {
      thumbHtml = `<div class="thumb-placeholder">🏔️</div>`;
    } else {
      thumbHtml = `<img class="thumb" src="${img.file}" alt="${img.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="thumb-ng" style="display:none">⚠️ 画像読込エラー</div>`;
    }
    const badgeLabels = {ok:'✅ 正常',fixed:'🔧 修正済み',ng:'❌ NG記録',warn:'⚠️ 要確認',placeholder:'🔲 絵文字表示'};
    html += `<div class="card" data-status="${img.status}">
      ${thumbHtml}
      <div class="meta">
        <div style="font-weight:700">${img.name}</div>
        <div class="section-label">${img.section}</div>
        <div class="file">${img.file || '（画像なし・絵文字グラデーション）'}</div>
        <span class="badge ${img.status}">${badgeLabels[img.status]}</span>
        <div class="note">${img.note}</div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function filterCards(f) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll(f);
}
